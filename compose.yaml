services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8787
    expose:
      - "8787"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - /var/www/certbot:/var/www/certbot:ro
