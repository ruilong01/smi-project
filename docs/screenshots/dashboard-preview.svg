<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="30%" cy="35%" r="85%">
      <stop offset="0%" stop-color="#0d2b36"/>
      <stop offset="55%" stop-color="#081b24"/>
      <stop offset="100%" stop-color="#050f15"/>
    </radialGradient>
    <radialGradient id="globe" cx="42%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#123a44"/>
      <stop offset="70%" stop-color="#0a262e"/>
      <stop offset="100%" stop-color="#061820"/>
    </radialGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2fe0c9"/>
      <stop offset="100%" stop-color="#1a8f8a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- header -->
  <text x="56" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="15" letter-spacing="3" fill="#39d6c4" font-weight="700">MARITIME RESEARCH INTELLIGENCE</text>
  <text x="56" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#eaf6f6" font-weight="700">Global Maritime Research Intelligence Map</text>

  <!-- filter chips -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#cfe9e8">
    <rect x="56" y="140" width="86" height="36" rx="18" fill="#123a3c" stroke="#2fe0c9" stroke-width="1.5"/>
    <text x="80" y="163">All</text>
    <rect x="152" y="140" width="150" height="36" rx="18" fill="#0e2730" stroke="#1f4b4e"/>
    <text x="172" y="163">Green Shipping</text>
    <rect x="312" y="140" width="130" height="36" rx="18" fill="#0e2730" stroke="#1f4b4e"/>
    <text x="332" y="163">Smart Ports</text>
    <rect x="452" y="140" width="168" height="36" rx="18" fill="#0e2730" stroke="#1f4b4e"/>
    <text x="472" y="163">Autonomous Vessels</text>
    <rect x="630" y="140" width="130" height="36" rx="18" fill="#0e2730" stroke="#1f4b4e"/>
    <text x="650" y="163">Maritime AI</text>
  </g>

  <!-- globe -->
  <circle cx="330" cy="410" r="230" fill="url(#globe)" stroke="#1f4b4e" stroke-width="1"/>
  <g stroke="#163b40" stroke-width="1" fill="none" opacity="0.7">
    <ellipse cx="330" cy="410" rx="230" ry="70"/>
    <ellipse cx="330" cy="410" rx="230" ry="140"/>
    <ellipse cx="330" cy="410" rx="70" ry="230"/>
    <ellipse cx="330" cy="410" rx="140" ry="230"/>
  </g>
  <!-- stylised landmasses -->
  <path d="M240 300 Q270 280 310 290 Q340 300 330 330 Q360 340 350 370 Q320 390 290 375 Q260 380 250 350 Q225 335 240 300 Z" fill="url(#land)" opacity="0.9"/>
  <path d="M400 420 Q450 400 500 430 Q520 460 480 490 Q440 510 410 480 Q380 460 400 420 Z" fill="url(#land)" opacity="0.85"/>
  <path d="M260 460 Q290 450 300 480 Q290 510 260 500 Q240 480 260 460 Z" fill="url(#land)" opacity="0.8"/>

  <!-- hub markers -->
  <g>
    <circle cx="300" cy="320" r="7" fill="#1a8f8a" stroke="#eaffee" stroke-width="1.5"/>
    <circle cx="330" cy="305" r="7" fill="#1a8f8a" stroke="#eaffee" stroke-width="1.5"/>
    <circle cx="470" cy="450" r="9" fill="#f2b94d" stroke="#fff7e6" stroke-width="1.5"/>
    <circle cx="278" cy="478" r="6" fill="#1a8f8a" stroke="#eaffee" stroke-width="1.5"/>
    <circle cx="360" cy="360" r="6" fill="#1a8f8a" stroke="#eaffee" stroke-width="1.5"/>
