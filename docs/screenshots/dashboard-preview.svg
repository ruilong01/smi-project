    <text x="666" y="252" font-size="13" letter-spacing="2" fill="#8fb9b8" font-weight="700">VISIBLE HUBS</text>
    <text x="666" y="284" font-size="22" fill="#eaf6f6" font-weight="700">7 maritime clusters</text>
    <rect x="666" y="300" width="452" height="1" fill="#1f4b4e"/>
    <text x="666" y="326" font-size="15" fill="#cfe9e8">Singapore — Supply-chain + Intelligent port services</text>
    <text x="666" y="352" font-size="15" fill="#8fb9b8">China — Autonomous navigation + Alt. fuels</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="640" y="388" width="504" height="180" rx="14" fill="#0b232b" stroke="#1f4b4e"/>
    <text x="666" y="420" font-size="13" letter-spacing="2" fill="#8fb9b8" font-weight="700">RESEARCH INTENSITY</text>
    <g>
      <rect x="666" y="440" width="52" height="10" rx="5" fill="#0d3a3c"/>
      <rect x="726" y="440" width="52" height="10" rx="5" fill="#12514f"/>
      <rect x="786" y="440" width="52" height="10" rx="5" fill="#1a8f8a"/>
      <rect x="846" y="440" width="52" height="10" rx="5" fill="#2fbfae"/>
      <rect x="906" y="440" width="52" height="10" rx="5" fill="#2fe0c9"/>
      <rect x="966" y="440" width="52" height="10" rx="5" fill="#f2b94d"/>
    </g>
    <text x="666" y="470" font-size="12" fill="#8fb9b8">Very Low</text>
    <text x="966" y="470" font-size="12" fill="#f2b94d">Very High</text>
    <text x="666" y="504" font-size="14" fill="#cfe9e8">Calculated from verified project, institution</text>
    <text x="666" y="526" font-size="14" fill="#cfe9e8">and publication-affiliation relationships.</text>
    <text x="666" y="556" font-size="13" fill="#5c8a89">Last synchronised · 4 sources tracked</text>
  </g>

  <text x="56" y="610" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#3f6b6a">Prototype demo data — source verification pending</text>
</svg>
