name: Deploy to Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lightsail-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          SSH_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -T 10 -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        shell: bash
        env:
          SSH_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          SSH_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          ssh -i ~/.ssh/lightsail_key -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd /opt/maritime-research
          git fetch origin main
          git reset --hard origin/main
          sudo docker compose up -d --build --remove-orphans

          # Self-install the daily data-refresh timer. Idempotent - safe to
          # run on every deploy. Data refresh is intentionally independent
          # of this code-deploy pipeline: this only ensures the timer unit
          # matches what's in git and stays enabled; it never runs
          # refresh:data itself as part of a deploy. See
          # docs/AWS_DATA_REFRESH.md for the full explanation.
          sudo cp deploy/systemd/maritime-data-refresh.service /etc/systemd/system/maritime-data-refresh.service
          sudo cp deploy/systemd/maritime-data-refresh.timer /etc/systemd/system/maritime-data-refresh.timer
          sudo systemctl daemon-reload
          sudo systemctl enable --now maritime-data-refresh.timer

          for attempt in $(seq 1 12); do
            if curl -fsS http://127.0.0.1/api/health >/dev/null; then
              echo "Deployment health check passed."
              exit 0
            fi
            sleep 5
          done

          sudo docker compose logs --tail=100
          exit 1
          REMOTE
